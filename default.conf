server {
  listen 8080;
  server_name localhost;
  root /srv/www/static;
  client_max_body_size 100M;
  
  # location @auth {
  #   proxy_pass https://www.google.com;
  # }
  proxy_hide_header 'Access-Control-Allow-Credentials';
  add_header 'Access-Control-Allow-Credentials' 'true';
  add_header 'Access-Control-Allow-Headers' 'Authorization,authorization,Accept,Origin,DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Content-Range,Range';
  add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS,PUT,DELETE,PATCH';

location / {
    location ~ /.+ {
        proxy_pass https://www.google.com;
    }
    proxy_pass https://www.google.com;
  }
  location = /nginxtest{
    return 200 '{\n  "success": true\n}\n';
    add_header Content-Type "application/json" always;
  }
  location = /webtest{
    proxy_pass https://www.google.com/webtest;
  }
  location = /api/authtest{
    proxy_pass https://www.google.com/api/entit/authtest;
  }
  location = /api/dmtest{
    proxy_pass https://www.google.com/api/address/dmtest;
  }
  location = /api/notitest{
    proxy_pass https://www.google.com/api/mail/notitest;
  }

  location = /api/getPdfAttachment{
    proxy_pass https://www.google.com/api/mail/getPdfAttachment;
  }
  location = /api/deletePdfAttachment{
    proxy_pass https://www.google.com/api/mail/deletePdfAttachment;
  }
  location = /api/addPdfAttachment{
    proxy_pass https://www.google.com/api/mail/addPdfAttachment;
  }

  location = /api/pdftest{
    proxy_pass https://www.google.com/api/genPdf/pdftest;
  }
  location = /api/workertest{
    proxy_pass https://www.google.com/api/workflow/workertest;
  }
  location = /api/auth/users/login{
    proxy_pass https://www.google.com/api/users/login;
  }
  location = /api/auth/users/checkSession{
    proxy_pass https://www.google.com/api/users/checkSession;
  }
  location = /api/auth/users/register{
    proxy_pass https://www.google.com/api/users/register;
  }
  location = /api/auth/users/forgotpassword{
    proxy_pass https://www.google.com/api/users/forgotpassword;
  }
  location = /api/auth/syspref/recaptcha_site_key{
    proxy_pass https://www.google.com/api/syspref/syspref/recaptcha_site_key;
  }
  location /api/auth/users/confirm/{
    proxy_pass https://www.google.com/api/users/confirm/;
  }
  location /api/auth/users/resetpass/{
    proxy_pass https://www.google.com/api/users/resetpass/;
  }
  location /api/auth/users/check-reset/{
    proxy_pass https://www.google.com/api/users/check-reset/;
  }
  location /api/data_management/worker/confirmSchedule{
    proxy_pass https://www.google.com/api/worker/confirmSchedule;
  }
  location /api/auth/ {
    if ($request_method = OPTIONS ) {
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Headers' 'Authorization,authorization,Accept,Origin,DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Content-Range,Range';
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS,PUT,DELETE,PATCH';
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 200;
    }
    auth_request /authenticate;
    proxy_pass https://www.google.com/api/;
    proxy_set_header Host $http_host;
  }
  location /api/data_management/ {
    if ($request_method = OPTIONS ) {
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Headers' 'Authorization,authorization,Accept,Origin,DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Content-Range,Range';
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS,PUT,DELETE,PATCH';
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 200;
	}
    auth_request /authenticate;
    proxy_pass https://www.google.com/api/;
  }
  location /api/notification/ {
    if ($request_method = OPTIONS ) {
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Headers' 'Authorization,authorization,Accept,Origin,DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Content-Range,Range';
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS,PUT,DELETE,PATCH';
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 200;
    }
    auth_request /authenticate;
    proxy_pass https://www.google.com/api/;
  }
  location /api/worker/ {
    if ($request_method = OPTIONS ) {
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Headers' 'Authorization,authorization,Accept,Origin,DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Content-Range,Range';
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS,PUT,DELETE,PATCH';
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 200;
    }
    auth_request /authenticate;
    proxy_pass https://www.google.com/api/;
  }
  location = /authenticate {
    proxy_pass https://www.google.com/api/users/checkSession;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
  }
}
